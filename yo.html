<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PWA Homepage</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #eef3f7;
      margin: 0;
      text-align: center;
    }
    header {
      background-color: #0078d7;
      color: white;
      padding: 15px 0;
    }
    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
    }
    .content {
      margin-top: 40px;
    }
    .install-btn {
      background-color: #0078d7;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    footer {
      background-color: #222;
      color: white;
      padding: 10px;
      position: fixed;
      width: 100%;
      bottom: 0;
    }
  </style>
</head>
<body>

<header>
  <h1>My Progressive Web App</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Features</a>
    <a href="#">Contact</a>
  </nav>
</header>

<div class="content">
  <h2>Welcome to My PWA!</h2>
  <p>Enjoy a fast, secure, and offline experience on any device.</p>
  <button class="install-btn">Install App</button>
</div>

<footer>
  <p>© 2025 MyPWA | All Rights Reserved</p>
</footer>

</body>
</html>
